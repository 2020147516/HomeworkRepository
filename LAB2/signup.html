<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
    <div class="nav-links">
        <a href="login.html">로그인</a> | <a href="signup.html">회원가입</a>
    </div>
    
    <div class="container">
        <div class="input-group">
            <label for="name">이름 :</label>
            <input type="text" id="name" name="name" autofocus>
        </div>

        <div class="input-group">
            <label for="birth">생일 :</label>
            <input type="date" id="birth" name="birth">
        </div>

        <div class="input-group">
            <label>성별 :</label>
            <input type="radio" id="male" name="gender" value="male"> 
            <label for="male" class="inline-label">남성</label>
            <input type="radio" id="female" name="gender" value="female"> 
            <label for="female" class="inline-label">여성</label>
        </div>

        <div class="input-group">
            <label for="grade">학년 :</label>
            <input type="number" id="grade" name="grade" step="1" min="1" max="4">
        </div>

        <div class="input-group">
            <label for="username">아이디 :</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="input-group">
            <label for="password">비밀번호 :</label>
            <input type="password" id="password" name="password" autocomplete="new-password">
        </div>

        <div class="input-group">
            <label for="email">이메일 :</label>
            <input type="email" id="email" name="email" placeholder="example@email.com">
        </div>

        <div class="input-group">
            <label for="security_q">보안 질문 :</label>
            <select id="security_q" name="security_q">
                <option value="">질문을 선택하세요</option>
                <option value="movie">가장 좋아하는 영화는 무엇입니까?</option>
                <option value="mother">어머니의 성함은 무엇입니까?</option>
                <option value="friend">초등학교 시절 가장 친한 친구의 이름은 무엇입니까?</option>
                <option value="pet">가장 처음 키웠던 반려동물의 이름은 무엇입니까?</option>
                <option value="car">첫 번째 자동차의 모델명은 무엇입니까?</option>
                <option value="born">태어난 고향은 어디입니까?</option>
            </select>
        </div>

        <div class="input-group">
            <label for="security_a">답변 :</label>
            <input type="text" id="security_a" name="security_a">
        </div>

        <div class="button-group">
            <button type="submit" class="btn-primary">Signup</button>
            <button type="button" class="btn-cancel">Cancel</button>
        </div>
    </div>
</body>
</html>
