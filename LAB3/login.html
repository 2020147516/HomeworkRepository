<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
    <div class="nav-links">
        <a href="login.html">로그인</a> | <a href="signup.html">회원가입</a>
    </div>
    
    <div class="container">
        <div class="input-group">
            <label for="login_id">아이디 :</label>
            <input type="text" id="login_id" name="login_id" placeholder="아이디 입력">
        </div>
        <div class="input-group">
            <label for="login_pw">비밀번호 :</label>
            <input type="password" id="login_pw" name="login_pw" placeholder="비밀번호 입력">
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn-primary">Login</button>
            <button type="button" class="btn-cancel">Cancel</button>
        </div>
    </div>
</body>
</html>
